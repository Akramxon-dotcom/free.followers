<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish | Markaz Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F4F7FE;
            --card: #FFFFFF;
            --text: #1B2559;
            --muted: #A3AED0;
            --brand: #4318FF;
            --brand-hover: #3311DB;
            --border: #E9EDF7;
            --danger: #EE5D50;
            --success: #05CD99;
        }

        body { 
            background: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .auth-card { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(112, 144, 176, 0.12); 
            width: 100%;
            max-width: 420px; 
            text-align: center;
            animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 20px;
        }

        @keyframes zoomIn { 
            from { opacity: 0; transform: scale(0.95); } 
            to { opacity: 1; transform: scale(1); } 
        }

        h2 { color: var(--text); margin-bottom: 8px; font-weight: 800; font-size: 28px; }
        p.desc { color: var(--muted); margin-bottom: 30px; font-size: 15px; }

        .inp-group { position: relative; margin-bottom: 18px; text-align: left; }
        
        .inp-label {
            display: block;
            margin-left: 5px;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .inp-wrapper { position: relative; }

        .inp { 
            width: 100%; 
            padding: 16px 45px 16px 16px; 
            border-radius: 16px; 
            border: 1px solid var(--border); 
            outline: none; 
            background: #fff; 
            font-weight: 600; 
            font-size: 15px;
            box-sizing: border-box;
            transition: 0.2s ease-in-out;
            color: var(--text);
        }

        .inp:focus { 
            border-color: var(--brand); 
            box-shadow: 0 0 0 4px rgba(67, 24, 255, 0.08); 
        }

        /* Parol ko'zchasi */
        .toggle-pass {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-pass:hover { color: var(--brand); }

        .btn { 
            width: 100%; 
            padding: 16px; 
            background: var(--brand); 
            color: white; 
            border: none; 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 16px;
            transition: 0.3s;
            margin-top: 15px;
            box-shadow: 0 10px 20px rgba(67, 24, 255, 0.15);
        }

        .btn:hover { 
            background: var(--brand-hover); 
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(67, 24, 255, 0.2);
        }

        .btn:disabled { background: var(--muted); cursor: not-allowed; transform: none; }

        .link { 
            display: block; 
            margin-top: 25px; 
            color: var(--text); 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 600;
        }

        .link b { color: var(--brand); }

        /* Xabarlar */
        .flash {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .flash.danger { background: #FFECEB; color: var(--danger); }
        .flash.success { background: #E6FFF5; color: var(--success); }

    </style>
</head>
<body>

    <div class="auth-card">
        <h2>Yangi Hisob</h2>
        <p class="desc">Markaz Pro ekotizimiga xush kelibsiz</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash {{ category }}">
                  <i class="fa-solid fa-circle-info"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/register" method="POST" id="regForm">
            <div class="inp-group">
                <label class="inp-label">Login</label>
                <div class="inp-wrapper">
                    <input type="text" name="username" class="inp" placeholder="@username" required minlength="4">
                </div>
            </div>

            <div class="inp-group">
                <label class="inp-label">Parol</label>
                <div class="inp-wrapper">
                    <input type="password" name="password" id="passInput" class="inp" placeholder="••••••••" required minlength="6">
                    <i class="fa-solid fa-eye toggle-pass" id="toggleIcon"></i>
                </div>
            </div>

            <button type="submit" class="btn" id="submitBtn">Ro'yxatdan o'tish</button>
        </form>

        <a href="/login" class="link">Profilingiz bormi? <b>Kirish</b></a>
    </div>

    <script>
        const regForm = document.getElementById('regForm');
        const submitBtn = document.getElementById('submitBtn');
        const passInput = document.getElementById('passInput');
        const toggleIcon = document.getElementById('toggleIcon');

        // 1. Parol ko'rinishini boshqarish
        toggleIcon.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            toggleIcon.classList.toggle('fa-eye');
            toggleIcon.classList.toggle('fa-eye-slash');
        });

        // 2. Formani yuborish va animatsiya
        regForm.onsubmit = function() {
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Yuklanmoqda...';
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.8";
        };

        // 3. Kichik interaktivlik: Login kiritilganda @ belgisini tekshirish (ixtiyoriy)
        const userInp = document.querySelector('input[name="username"]');
        userInp.addEventListener('input', (e) => {
            if(e.target.value.length > 0 && !e.target.value.startsWith('@')) {
                // Avtomatik @ qo'shishni istasangiz shu yerga yozishingiz mumkin
            }
        });
    </script>
</body>
</html>
